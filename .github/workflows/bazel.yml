# Best-effort, NON-GATING Bazel build of the full cppyy stack. The supported
# build is setup.py/CMake; this job never blocks a PR (continue-on-error). The
# build/test steps run for real and surface a regression as a warning, not a
# false green.
#
# TEMPORARY fork coupling: cppyy/bazel/ and the MODULE.bazel files of the cppyy
# stack still live ONLY on the conrade-ctc forks @ bazel-build-upstream.
# CppInterOp's Bazel infra is already merged upstream, so it is cloned from
# compiler-research/main; the rest come from the fork (FORK_OWNER / FORK_BRANCH
# below). Drop the fork clone once those merge too.
name: bazel (best-effort)

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  bazel:
    name: bazel (best-effort) llvm${{ matrix.llvm }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        llvm: ["22"]
    steps:
      # No `path:` -> cppyy is $GITHUB_WORKSPACE; siblings are cloned alongside
      # it so the local_path_overrides (../CppInterOp, ../cppyy-backend,
      # ../CPyCppyy) resolve. cppyy_bazel is this repo's own bazel/ subdir.
      - name: Checkout cppyy
        uses: actions/checkout@v4

      - name: Clone sibling repos (fork carries the remaining Bazel infra)
        run: |
          set -eux
          cd "$GITHUB_WORKSPACE/.."
          # CppInterOp's Bazel infra is merged upstream.
          git clone --depth=1 -b main \
            "https://github.com/compiler-research/CppInterOp.git"
          FORK_OWNER="conrade-ctc"            # TODO: compiler-research after infra merges
          FORK_BRANCH="bazel-build-upstream"  # TODO: default branch after infra merges
          for repo in cppyy-backend CPyCppyy; do
            git clone --depth=1 -b "$FORK_BRANCH" \
              "https://github.com/${FORK_OWNER}/${repo}.git"
          done

      - name: Setup LLVM ${{ matrix.llvm }}
        uses: compiler-research/ci-workflows/actions/setup-llvm@main
        with:
          version: ${{ matrix.llvm }}
          os: ubuntu-24.04

      - name: Point LLVM_DIR at the tree root for the @llvm Bazel extension
        run: |
          # setup-llvm sets LLVM_DIR=<prefix>/lib/cmake/llvm (CMake convention);
          # cppyy/bazel/llvm.bzl needs the tree root holding bin/llvm-config.
          echo "LLVM_DIR=${GITHUB_WORKSPACE}/install" >> "$GITHUB_ENV"

      - name: bazel build //...
        run: |
          bazelisk build //... \
            || echo "::warning::bazel build //... failed (best-effort, non-gating)"

      - name: bazel test //:tests
        run: |
          bazelisk test //:tests \
            || echo "::warning::bazel test //:tests failed (best-effort, non-gating)"
